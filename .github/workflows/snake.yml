name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: GustaLVS
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Deploy snake
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
